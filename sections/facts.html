<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>facts</title>
</head>
<body>
  <div data-partial-root>
<section id="facts" class="facts">
  <div class="container">
    <div class="section-title">
      <h2>Dati</h2>
      <p>Di seguito i risultati di analisi su alcune mie statistiche.</p>
    </div>

    <div class="row no-gutters">
      <div class="col-lg-3 col-md-6 d-md-flex align-items-md-stretch" data-aos="fade-up">
        <div class="count-box">
          <i class="bi bi-wrench"></i>
          <span data-purecounter-start="0" data-purecounter-end="163" data-purecounter-duration="1" class="purecounter"></span>
          <p><strong>Lavori eseguiti</strong> fino ad ora</p>
        </div>
      </div>

      <div class="col-lg-3 col-md-6 d-md-flex align-items-md-stretch" data-aos="fade-up" data-aos-delay="100">
        <div class="count-box">
          <i class="bi bi-file-person-fill"></i>
          <span data-purecounter-start="0" data-purecounter-end="82" data-purecounter-duration="1" class="purecounter"></span>
          <p><strong>Consulenze</strong> effettuate</p>
        </div>
      </div>

      <div class="col-lg-3 col-md-6 d-md-flex align-items-md-stretch" data-aos="fade-up" data-aos-delay="200">
        <div class="count-box">
          <i class="bi bi-stopwatch"></i>
          <span data-purecounter-start="0" data-purecounter-end="627" data-purecounter-duration="1" class="purecounter"></span>
          <p><strong>Ore</strong> impiegate per i clienti</p>
        </div>
      </div>

      <div class="col-lg-3 col-md-6 d-md-flex align-items-md-stretch" data-aos="fade-up" data-aos-delay="300">
        <div class="count-box">
          <i class="bi bi-github"></i>
          <span data-purecounter-start="0" data-purecounter-end="6" data-purecounter-duration="1" class="purecounter"></span>
          <p><strong>GitHub Repositories</strong> creati fino ad ora</p>
        </div>
      </div>
    </div>
  </div>
</section>

  </div>
</body>
</html>
