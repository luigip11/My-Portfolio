    </div>

    <div class="row" data-aos="fade-in">
      <div class="col-lg-5 d-flex align-items-stretch">

            <i class="bi bi-geo-alt"></i>

            <p>Gravina in Puglia, BA</p>
          </div>

          <div class="email">
            <i class="bi bi-envelope"></i>
            <h4>Email</h4>
            <p><a href="mailto:luigi.p11@outlook.it">luigi.p11@outlook.it</a></p>
          </div>

          <div class="facebook">
            <i class="bx bxl-facebook"></i>
            <h4>Facebook</h4>
            <p><a href="https://www.facebook.com/LPSoluzioniInformatiche/" target="_blank" rel="noopener noreferrer">La mia pagina</a></p>
          </div>

          <div class="linkedin">
            <i class="bx bxl-linkedin"></i>
            <h4>Linkedin</h4>
            <p><a href="https://www.linkedin.com/in/luigi-puzziferri-11g1993a/" target="_blank" rel="noopener noreferrer">Il mio profilo</a></p>
          </div>

          <div class="phone">
            <i class="bi bi-phone"></i>
            <h4>Cellulare</h4>
            <p>Il mio numero di cellulare e accessibile solo su richiesta!</p>
          </div>
        </div>
      </div>

      <div class="col-lg-5 d-flex right-image">

          <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d12077.748978238948!2d16.416160191205815!3d40.81835865803735!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x13387bf440c0f9c3%3A0xe3bf1996040bacc1!2s70024%20Gravina%20in%20Puglia%20BA!5e0!3m2!1sit!2sit!4v1630313845864!5m2!1sit!2sit" frameborder="0" style="border:0; width: 100%; height: 500px;" allowfullscreen></iframe>
        </div>
